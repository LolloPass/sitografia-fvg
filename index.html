<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sitografia FVG — Orientamento e Formazione</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,700;1,9..144,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:        #0d2b4e;
  --bg2:       #0a2240;
  --bg3:       #112f58;
  --surface:   #ffffff;
  --glass:     rgba(255,255,255,0.06);
  --glass-b:   rgba(255,255,255,0.12);
  --text:      #ffffff;
  --text-2:    rgba(255,255,255,0.65);
  --text-3:    rgba(255,255,255,0.38);
  --accent:    #4da6e8;
  --accent2:   #7ec8f5;
  --radius:    16px;
  --radius-sm: 10px;
  --card-r:    14px;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'DM Sans',system-ui,sans-serif;
  font-size:15px;
  line-height:1.6;
  min-height:100vh;
  background-image:
    radial-gradient(ellipse 80% 50% at 20% -10%, rgba(77,166,232,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 110%, rgba(30,80,140,0.35) 0%, transparent 60%);
}

/* ── Password screen ─────────────────────────────────────────── */
.pw-screen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:20px;
}
.pw-box{
  background:rgba(255,255,255,0.07);
  border:1px solid var(--glass-b);
  border-radius:24px;padding:48px 40px;
  width:min(400px,100%);text-align:center;
  backdrop-filter:blur(20px);
}
.pw-logo-wrap{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:28px}
.pw-logo1{height:50px;width:auto}
.pw-sep{width:1px;height:40px;background:var(--glass-b)}
.pw-logo2{height:32px;width:auto;opacity:.9}
.pw-box h2{font-family:'Fraunces',serif;font-size:22px;font-weight:600;color:white;margin-bottom:6px;letter-spacing:-.02em}
.pw-box p{font-size:13px;color:var(--text-2);margin-bottom:28px}
.pw-input{
  width:100%;padding:13px 16px;
  background:rgba(255,255,255,0.08);
  border:1px solid var(--glass-b);border-radius:var(--radius-sm);
  color:white;font-family:inherit;font-size:15px;text-align:center;
  letter-spacing:.12em;outline:none;margin-bottom:12px;transition:border-color .2s;
}
.pw-input::placeholder{color:var(--text-3);letter-spacing:0}
.pw-input:focus{border-color:var(--accent);background:rgba(255,255,255,0.11)}
.pw-btn{
  width:100%;padding:13px;
  background:var(--accent);border:none;border-radius:var(--radius-sm);
  color:white;font-family:inherit;font-size:14px;font-weight:500;
  cursor:pointer;transition:opacity .15s,transform .1s;letter-spacing:.01em;
}
.pw-btn:hover{opacity:.88}
.pw-btn:active{transform:scale(.98)}
.pw-error{font-size:12px;color:#f87272;margin-top:10px;min-height:18px}

/* ── App ─────────────────────────────────────────────────────── */
.app{display:none}
.app.visible{display:block}

/* ── Layout ─────────────────────────────────────────────────── */
.page{max-width:1120px;margin:0 auto;padding:0 28px 100px}

/* ── Header ─────────────────────────────────────────────────── */
.site-header{
  padding:32px 0 26px;
  border-bottom:1px solid var(--glass-b);
  margin-bottom:32px;
}
.header-inner{
  display:flex;align-items:center;justify-content:space-between;
  gap:24px;flex-wrap:wrap;
}
.header-left{display:flex;align-items:center;gap:20px}
.header-logos{display:flex;align-items:center;gap:16px}
.logo-orientamento{height:52px;width:auto}
.logo-divider{width:1px;height:42px;background:var(--glass-b)}
.logo-regione{height:34px;width:auto;opacity:.88}
.header-text h1{
  font-family:'Fraunces',serif;
  font-size:clamp(20px,3vw,28px);font-weight:700;
  color:white;letter-spacing:-.03em;line-height:1.1;
}
.header-text p{font-size:12px;color:var(--text-2);margin-top:3px;letter-spacing:.01em}

/* Search */
.header-search{position:relative}
.header-search svg{
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
  width:15px;height:15px;color:var(--text-3);pointer-events:none;
}
.header-search input{
  padding:11px 16px 11px 38px;
  background:var(--glass);border:1px solid var(--glass-b);
  border-radius:30px;color:white;font-family:inherit;font-size:13px;
  width:230px;outline:none;transition:all .25s;
}
.header-search input::placeholder{color:var(--text-3)}
.header-search input:focus{
  border-color:var(--accent);background:rgba(255,255,255,0.1);width:270px;
}

/* ── Filters ─────────────────────────────────────────────────── */
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
.filter-btn{
  padding:7px 16px;font-size:12px;font-family:inherit;font-weight:500;
  border:1px solid var(--glass-b);border-radius:30px;
  background:transparent;color:var(--text-2);cursor:pointer;
  transition:all .18s;letter-spacing:.01em;
}
.filter-btn:hover{border-color:rgba(255,255,255,.3);color:white;background:var(--glass)}
.filter-btn.active{
  background:var(--accent);border-color:var(--accent);color:white;
  box-shadow:0 2px 12px rgba(77,166,232,.35);
}

/* ── Stats ───────────────────────────────────────────────────── */
.stats-bar{margin-bottom:18px}
.stats-bar span{font-size:12px;color:var(--text-3);letter-spacing:.02em}

/* ── Grid ────────────────────────────────────────────────────── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px}

/* ── Card ────────────────────────────────────────────────────── */
.card{
  background:white;
  border-radius:var(--card-r);
  padding:0;
  display:flex;flex-direction:column;
  cursor:pointer;
  overflow:hidden;
  position:relative;
  transition:transform .2s cubic-bezier(.34,1.56,.64,1), box-shadow .2s;
  box-shadow:0 2px 8px rgba(0,0,0,.12);
}
.card:hover{
  transform:translateY(-4px);
  box-shadow:0 12px 32px rgba(0,0,0,.22), 0 2px 8px rgba(0,0,0,.12);
}
.card-accent{
  height:4px;width:100%;flex-shrink:0;
}
.card-body{
  padding:18px 20px 16px;
  display:flex;flex-direction:column;gap:9px;flex:1;
}
.card-cat-row{display:flex;align-items:center;gap:8px;margin-bottom:2px}
.card-tag{
  font-size:10px;font-weight:500;padding:3px 9px;
  border-radius:20px;letter-spacing:.02em;
}
.card-title{
  font-family:'Fraunces',serif;
  font-size:15px;font-weight:600;
  color:#0d2b4e;line-height:1.28;
  letter-spacing:-.01em;
}
.card-desc{
  font-size:12.5px;color:#4a6080;
  line-height:1.6;flex:1;
}
.card-footer{
  display:flex;align-items:center;justify-content:flex-end;
  margin-top:8px;padding-top:12px;
  border-top:1px solid #f0f4f8;
}
.btn-detail{
  font-size:12px;padding:6px 14px;border-radius:8px;
  background:#f0f6ff;border:none;
  color:#1a5296;cursor:pointer;font-family:inherit;font-weight:500;
  transition:all .15s;display:flex;align-items:center;gap:5px;
}
.btn-detail:hover{background:#daeaff;color:#0d3d7a}
.btn-detail::after{content:'→';font-size:13px}

/* Tooltip */
.tooltip{
  position:absolute;bottom:calc(100% + 10px);left:12px;
  background:#0d2b4e;border:1px solid rgba(255,255,255,.15);
  border-radius:10px;padding:10px 14px;width:210px;
  z-index:50;pointer-events:none;
  box-shadow:0 8px 30px rgba(0,0,0,.35);
  opacity:0;transform:translateY(6px);
  transition:opacity .18s,transform .18s;
}
.card:hover .tooltip{opacity:1;transform:translateY(0)}
.tooltip-url{font-size:11px;color:#7ec8f5;margin-bottom:5px;word-break:break-all}
.tooltip-row{font-size:11px;color:rgba(255,255,255,.65);margin-top:3px}
.tooltip-row strong{color:rgba(255,255,255,.38);font-weight:500}

.no-results{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text-3);font-size:14px}

/* ── Modal ───────────────────────────────────────────────────── */
.overlay{
  position:fixed;inset:0;background:rgba(5,20,45,.65);
  z-index:200;display:flex;align-items:center;justify-content:center;
  padding:20px;opacity:0;pointer-events:none;transition:opacity .22s;
  backdrop-filter:blur(6px);
}
.overlay.open{opacity:1;pointer-events:all}
.modal{
  background:white;border-radius:20px;padding:36px;
  width:min(580px,100%);max-height:88vh;overflow-y:auto;
  transform:translateY(20px) scale(.97);
  transition:transform .22s cubic-bezier(.34,1.56,.64,1);
  position:relative;
}
.overlay.open .modal{transform:translateY(0) scale(1)}
.modal-close{
  position:absolute;top:18px;right:18px;width:32px;height:32px;
  border-radius:50%;background:#f0f4f8;border:none;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:16px;color:#4a6080;transition:all .15s;
}
.modal-close:hover{background:#daeaff;color:#0d3d7a}
.modal-accent{height:5px;border-radius:10px;margin-bottom:20px}
.modal-cat{display:inline-block;font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;margin-bottom:14px}
.modal h2{
  font-family:'Fraunces',serif;font-size:22px;font-weight:700;
  color:#0d2b4e;line-height:1.22;margin-bottom:12px;letter-spacing:-.02em;
}
.modal-detail{font-size:14px;color:#4a6080;line-height:1.78;margin-bottom:26px}
.modal-meta{
  background:#f7faff;border-radius:12px;padding:16px 18px;
  display:flex;flex-direction:column;gap:12px;margin-bottom:24px;
}
.meta-row{display:flex;gap:12px;align-items:flex-start}
.meta-label{
  font-size:11px;font-weight:500;color:#8aaccf;
  text-transform:uppercase;letter-spacing:.06em;
  min-width:110px;padding-top:2px;
}
.meta-value{font-size:13px;color:#1a3a5c;font-weight:500}
.modal-link{
  display:inline-flex;align-items:center;gap:8px;
  padding:11px 24px;background:#0d2b4e;
  color:white;border-radius:var(--radius-sm);font-size:13px;
  font-weight:500;text-decoration:none;transition:opacity .15s;
  font-family:inherit;
}
.modal-link:hover{opacity:.85}
.modal-nolink{font-size:12px;color:#8aaccf;margin-top:4px}

/* Config banner */
.config-banner{
  background:rgba(255,200,60,.1);border:1px solid rgba(255,200,60,.3);
  border-radius:var(--radius-sm);padding:12px 18px;
  font-size:13px;color:#ffd87a;margin-bottom:24px;display:none;
}
.config-banner.visible{display:block}
.config-banner code{
  background:rgba(255,255,255,.1);padding:2px 6px;
  border-radius:4px;font-family:monospace;font-size:12px;
}

/* Loading */
.state-box{text-align:center;padding:80px 20px;color:var(--text-2);font-size:14px}
.spinner{
  width:30px;height:30px;margin:0 auto 18px;
  border:2px solid var(--glass-b);border-top-color:var(--accent);
  border-radius:50%;animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* Stagger animation */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(14px)}
  to{opacity:1;transform:translateY(0)}
}
.card{animation:fadeUp .35s ease both}
</style>
</head>

function parseCSV(t){
  const rows=[];let cur=[],f='',q=false;
  for(let i=0;i<t.length;i++){
    const c=t[i],n=t[i+1];
    if(q){if(c==='"'&&n==='"'){f+='"';i++;}else if(c==='"'){q=false;}else{f+=c;}}
    else{if(c==='"'){q=true;}else if(c===','){cur.push(f.trim());f='';}else if(c==='\n'||(c==='\r'&&n==='\n')){cur.push(f.trim());rows.push(cur);cur=[];f='';if(c==='\r')i++;}else{f+=c;}}
  }
  if(f||cur.length){cur.push(f.trim());rows.push(cur);}
  return rows;
}
function toObjs(rows){
  if(rows.length<2)return[];
  const h=rows[0].map(x=>x.trim());
  return rows.slice(1).filter(r=>r.some(c=>c)).map(r=>{const o={};h.forEach((k,i)=>o[k]=(r[i]||'').trim());return o;});
}

let all=[],visible=[],activeF='Tutti';

function renderApp(){
  const cats=['Tutti',...new Set(all.map(r=>r['Categoria']).filter(Boolean))];
  document.getElementById('main-content').innerHTML=
    `<div class="filter-row" id="filters"></div>
     <div class="stats-bar"><span id="stats"></span></div>
     <div class="grid" id="grid"></div>`;
  renderFilters(cats);filterAndRender();
}

function renderFilters(cats){
  document.getElementById('filters').innerHTML=cats.map(c=>
    `<button class="filter-btn ${c===activeF?'active':''}" onclick="setF('${c.replace(/'/g,"\\'")}')"> ${c}</button>`
  ).join('');
}

function setF(c){activeF=c;const cats=['Tutti',...new Set(all.map(r=>r['Categoria']).filter(Boolean))];renderFilters(cats);filterAndRender();}

function filterAndRender(){
  const q=(document.getElementById('search')?.value||'').toLowerCase();
  visible=all.filter(r=>{
    const mC=activeF==='Tutti'||r['Categoria']===activeF;
    const mS=!q||['Titolo','Descrizione','Categoria','Target'].some(k=>(r[k]||'').toLowerCase().includes(q));
    return mC&&mS;
  });
  document.getElementById('stats').textContent=`${visible.length} risorse trovate`;
  const grid=document.getElementById('grid');
  if(!visible.length){grid.innerHTML='<div class="no-results">Nessuna risorsa trovata.</div>';return;}
  grid.innerHTML=visible.map((r,i)=>cardHTML(r,i)).join('');
  // Stagger
  grid.querySelectorAll('.card').forEach((c,i)=>c.style.animationDelay=`${i*0.04}s`);
}

function cardHTML(r,i){
  const c=CATS[r['Categoria']]||DEF;
  const url=r['URL']&&r['URL']!=='#'?r['URL']:'';
  const domain=url?url.replace(/https?:\/\//,'').split('/')[0]:'—';
  return `<div class="card" onclick="openModal(${i})">
    <div class="tooltip">
      <div class="tooltip-url">${domain}</div>
      <div class="tooltip-row"><strong>Per:</strong> ${r['Target']||'—'}</div>
      <div class="tooltip-row"><strong>Aggiornamento:</strong> ${r['Aggiornamento']||'—'}</div>
    </div>
    <div class="card-accent" style="background:${c.a}"></div>
    <div class="card-body">
      <div class="card-cat-row">
        <span class="card-tag" style="background:${c.bg};color:${c.text};border:1px solid ${c.border}">${r['Categoria']||''}</span>
      </div>
      <div class="card-title">${r['Titolo']||''}</div>
      <div class="card-desc">${r['Descrizione']||''}</div>
      <div class="card-footer">
        <button class="btn-detail">Dettagli</button>
      </div>
    </div>
  </div>`;
}

function openModal(i){
  const r=visible[i];const c=CATS[r['Categoria']]||DEF;
  const url=r['URL']&&r['URL']!=='#'?r['URL']:'';
  document.getElementById('modal-content').innerHTML=`
    <div class="modal-accent" style="background:${c.a}"></div>
    <span class="modal-cat" style="background:${c.bg};color:${c.text};border:1px solid ${c.border}">${r['Categoria']}</span>
    <h2>${r['Titolo']||''}</h2>
    <p class="modal-detail">${r['Dettaglio']||r['Descrizione']||''}</p>
    <div class="modal-meta">
      <div class="meta-row"><span class="meta-label">A chi è rivolto</span><span class="meta-value">${r['Target']||'—'}</span></div>
      <div class="meta-row"><span class="meta-label">Aggiornamento</span><span class="meta-value">${r['Aggiornamento']||'—'}</span></div>
    </div>
    ${url?`<a href="${url}" class="modal-link" target="_blank" rel="noopener">Vai al sito →</a>`:`<p class="modal-nolink">Link in fase di verifica</p>`}
  `;
  document.getElementById('overlay').classList.add('open');
}

document.getElementById('overlay').addEventListener('click',e=>{
  if(e.target===document.getElementById('overlay'))document.getElementById('overlay').classList.remove('open');
});
document.getElementById('modalClose').addEventListener('click',()=>document.getElementById('overlay').classList.remove('open'));
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.getElementById('overlay').classList.remove('open');});

async function init(){
  const ok=SHEET_CSV_URL&&SHEET_CSV_URL!=='INSERISCI_QUI_IL_TUO_URL_CSV';
  if(!ok){document.getElementById('configBanner').classList.add('visible');all=toObjs(SAMPLE);renderApp();return;}
  try{
    const res=await fetch(SHEET_CSV_URL);
    if(!res.ok)throw new Error('HTTP '+res.status);
    all=toObjs(parseCSV(await res.text()));
    if(!all.length)throw new Error('Foglio vuoto');
    renderApp();
  }catch(e){
    document.getElementById('main-content').innerHTML=
      `<div class="state-box" style="color:#f87272">⚠️ Impossibile caricare i dati.<br><span style="color:var(--text-3);font-size:12px;margin-top:6px;display:block">Controlla che il foglio sia pubblicato come CSV.<br>Errore: ${e.message}</span></div>`;
  }
}
if(sessionStorage.getItem(SESSION_KEY)==='1'){init();}
</script>
